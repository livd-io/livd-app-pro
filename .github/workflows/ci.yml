name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [apps/app, apps/marketing]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.app }}
      - run: npm run lint --if-present
        working-directory: ${{ matrix.app }}
      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ matrix.app == 'apps/app' && secrets.NEXT_PUBLIC_SUPABASE_URL || '' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ matrix.app == 'apps/app' && secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || '' }}
